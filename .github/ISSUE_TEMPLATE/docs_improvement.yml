name: Documentation Improvement
description: Suggest improvements to documentation
title: "[Docs] "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Documentation Location
      description: Which file or page needs improvement?
      placeholder: "e.g. README.md, docs/PROJECT_LEVELS.md, CONTRIBUTING.md"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What is wrong or missing in the current documentation?
      placeholder: Describe what's unclear, outdated, or incomplete.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
      placeholder: Describe what should be added, changed, or clarified.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, links, or references.
      placeholder: Add any extra information here.
    validations:
      required: false
